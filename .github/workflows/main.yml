name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    # Wir zwingen GitHub, das neueste macOS 15 zu nutzen, da dort die neuesten Xcode-Versionen liegen
    runs-on: macos-15

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Xcode Version auf Swift 6.2 einstellen
        # Dieser Befehl wählt die neueste auf dem Server verfügbare Xcode-Version aus (meist die Beta)
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app || sudo xcode-select -s /Applications/Xcode_16.3_beta.app
          swift --version

      - name: App kompilieren (Ohne Zertifikat)
        run: |
          xcodebuild clean archive \
            -project "IcySky.xcodeproj" \
            -scheme "IcySky" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath unsigned.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Zur IPA packen
        run: |
          mkdir -p Payload
          cp -r unsigned.xcarchive/Products/Applications/*.app Payload/
          zip -r IcySky.ipa Payload

      - name: IPA zum Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: IcySky-App
          path: IcySky.ipa

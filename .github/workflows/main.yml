name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Swift-Version downgraden (Workaround)
        run: |
          find . -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.2.0/swift-tools-version: 6.1.0/g' {} +
          find . -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.2/swift-tools-version: 6.1/g' {} +

      - name: Tuist installieren & Projekt vorbereiten (via mise)
        # Nutzt die offizielle mise-Action, um exakt die vom Entwickler verlangte Tuist-Version zu laden
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Tuist Abhängigkeiten laden
        run: |
          # Führt Tuist über mise aus
          mise exec -- tuist install
          mise exec -- tuist generate

      - name: App kompilieren (Ohne Zertifikat)
        run: |
          if [ -d "IcySky.xcworkspace" ]; then
            export PROJECT_ARG="-workspace IcySky.xcworkspace"
          else
            export PROJECT_ARG="-project IcySky.xcodeproj"
          fi
          
          xcodebuild clean archive \
            $PROJECT_ARG \
            -scheme "IcySky" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath unsigned.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Zur IPA packen
        run: |
          mkdir -p Payload
          cp -r unsigned.xcarchive/Products/Applications/*.app Payload/
          zip -r IcySky.ipa Payload

      - name: IPA zum Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: IcySky-App
          path: IcySky.ipa

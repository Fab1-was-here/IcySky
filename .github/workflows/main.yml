name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Swift-Version downgraden (Workaround)
        run: |
          # Wir ändern im Code die Voraussetzung von Swift 6.2 auf 6.1
          find . -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.2.0/swift-tools-version: 6.1.0/g' {} +
          find . -name "Package.swift" -exec sed -i '' 's/swift-tools-version: 6.2/swift-tools-version: 6.1/g' {} +

      - name: Tuist installieren & Projekt vorbereiten
        run: |
          # Installiert Tuist (Das neue Build-Tool von IcySky)
          curl -Ls https://install.tuist.io | bash
          
          # Lädt die Pakete und generiert die frischen Xcode-Dateien
          tuist install
          tuist generate

      - name: App kompilieren (Ohne Zertifikat)
        run: |
          # Tuist erstellt in der Regel einen Workspace (.xcworkspace)
          # Falls nicht, fällt das Skript automatisch auf die .xcodeproj zurück
          if [ -d "IcySky.xcworkspace" ]; then
            export PROJECT_ARG="-workspace IcySky.xcworkspace"
          else
            export PROJECT_ARG="-project IcySky.xcodeproj"
          fi
          
          xcodebuild clean archive \
            $PROJECT_ARG \
            -scheme "IcySky" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath unsigned.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Zur IPA packen
        run: |
          mkdir -p Payload
          cp -r unsigned.xcarchive/Products/Applications/*.app Payload/
          zip -r IcySky.ipa Payload

      - name: IPA zum Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: IcySky-App
          path: IcySky.ipa

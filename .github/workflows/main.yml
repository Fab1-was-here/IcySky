name: Build Unsigned IPA

on:
  workflow_dispatch: # Erlaubt das manuelle Starten per Knopfdruck

jobs:
  build:
    runs-on: macos-latest # Nutzt einen virtuellen Mac von GitHub

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: App kompilieren (Ohne Zertifikat)
        run: |
          # Hier sagen wir Xcode, dass es ohne Apple-Zertifikat bauen soll
          xcodebuild clean archive \
            -project "IcySky.xcodeproj" \
            -scheme "IcySky" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath unsigned.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Zur IPA packen
        run: |
          # Eine .ipa ist eigentlich nur ein .zip-Ordner mit einem Ordner namens "Payload"
          mkdir -p Payload
          cp -r unsigned.xcarchive/Products/Applications/*.app Payload/
          zip -r IcySky.ipa Payload

      - name: IPA zum Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: IcySky-App
          path: IcySky.ipa
